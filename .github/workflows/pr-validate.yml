name: pr-validate

on:
  pull_request:
    branches:
      - main

jobs:
  bicep-validate:
    name: Bicep build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Bicep files build
        run: |
          az bicep build --file infra/bicep/main.bicep
          az bicep build --file infra/bicep/rg.bicep

