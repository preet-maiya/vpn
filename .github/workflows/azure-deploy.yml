name: deploy-azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region to deploy"
        required: false
        default: "centralindia"
      vm_priority:
        description: "VM priority (Spot or Regular)"
        required: false
        default: "Regular"

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: ts-exit-rg
  LOCATION: ${{ inputs.location || 'centralindia' }}
  VM_PRIORITY: ${{ inputs.vm_priority || 'Regular' }}
  SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Validate Bicep
        run: az bicep build --file infra/bicep/main.bicep

  deploy-infra:
    runs-on: ubuntu-latest
    needs: validate-bicep
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Create resource group
        run: az group create -n ${{ env.RESOURCE_GROUP }} -l ${{ env.LOCATION }}
      - name: Deploy Bicep to resource group (incremental)
        run: |
          az deployment group create \
            --name ts-exit-deploy \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/bicep/rg.bicep \
            --parameters location=${{ env.LOCATION }} tailscaleAuthKey=${{ secrets.TAILSCALE_AUTH_KEY }} vmPriority=${{ env.VM_PRIORITY }} sshPublicKey="${{ env.SSH_PUBLIC_KEY }}"

  deploy-functions:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r functions/requirements.txt --target functions/.python_packages/lib/site-packages
      - name: Archive functions
        run: |
          cd functions
          zip -r ../functions.zip . -x "__pycache__/*" -x ".venv/*"
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Get Function App Name
        id: getapp
        run: |
          APP=$(az functionapp list -g ${{ env.RESOURCE_GROUP }} --query "[?contains(name, 'ts-exit')].name | [0]" -o tsv)
          echo "app=$APP" >> $GITHUB_OUTPUT
      - name: Deploy package
        run: |
          az functionapp deployment source config-zip \
            --name ${{ steps.getapp.outputs.app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src functions.zip
