name: pr-validate

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  LOCATION: centralindia
  STAGING_RG: ts-exit-staging-rg
  AZ_CLI_VERSION: "2.56.0"
  BICEP_VERSION: "0.26.170"

jobs:
  detect-changes:
    name: Detect files needing full deploy
    runs-on: ubuntu-latest
    outputs:
      full_deploy: ${{ steps.filter.outputs.full_deploy }}
    steps:
      - uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            full_deploy:
              - 'infra/bicep/**'
              - 'functions/**'
              - 'scripts/**'

  bicep-validate:
    name: Bicep build
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4
      - name: Setup Azure CLI
        uses: azure/cli@v1
        with:
          azcliversion: ${{ env.AZ_CLI_VERSION }}
      - name: Install pinned Bicep CLI
        run: az bicep install --version v${{ env.BICEP_VERSION }}
      - name: Ensure Bicep files build
        run: |
          az bicep build --file infra/bicep/main.bicep
          az bicep build --file infra/bicep/rg.bicep

  what-if-staging:
    name: Bicep what-if (staging RG)
    runs-on: ubuntu-latest
    needs: [detect-changes, bicep-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Azure CLI
        uses: azure/cli@v1
        with:
          azcliversion: ${{ env.AZ_CLI_VERSION }}
      - name: Install pinned Bicep CLI
        run: az bicep install --version v${{ env.BICEP_VERSION }}
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: What-if against staging RG
        run: |
          az deployment group what-if \
            --name pr-whatif-${{ github.run_number }} \
            --resource-group ${{ env.STAGING_RG }} \
            --template-file infra/bicep/rg.bicep \
            --parameters location=${{ env.LOCATION }} tailscaleAuthKey='dummy-whatif-key' sshPublicKey='ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQDdummy' vmPriority=Regular
        env:
          AZURE_DEFAULTS_GROUP: ${{ env.STAGING_RG }}

  # terraform-validate:
  #   name: Terraform fmt & validate
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: infra/terraform
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Setup Terraform
  #       uses: hashicorp/setup-terraform@v3
  #       with:
  #         terraform_version: 1.6.6
  #     - name: Format check
  #       run: terraform fmt -check
  #     - name: Init (no backend)
  #       run: terraform init -backend=false -input=false
  #       env:
  #         TF_IN_AUTOMATION: "true"
  #     - name: Validate configuration
  #       run: |
  #         terraform validate -no-color \
  #           -var subscription_id="00000000-0000-0000-0000-000000000000" \
  #           -var tailscale_auth_key="dummy"
  #       env:
  #         TF_IN_AUTOMATION: "true"

  python-syntax:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install function dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r functions/requirements.txt
      - name: Run pytest
        working-directory: functions
        run: pytest

  pr-full-deploy:
    name: Ephemeral deploy (label: full-deploy)
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'full-deploy') ||
      needs['detect-changes'].outputs.full_deploy == 'true'
    needs: [detect-changes, bicep-validate, what-if-staging, python-syntax]
    env:
      RG_NAME: ts-exit-pr-${{ github.event.number }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Azure CLI
        uses: azure/cli@v1
        with:
          azcliversion: ${{ env.AZ_CLI_VERSION }}
      - name: Install pinned Bicep CLI
        run: az bicep install --version v${{ env.BICEP_VERSION }}
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Create ephemeral resource group
        run: az group create -n $RG_NAME -l ${{ env.LOCATION }}
      - name: Deploy minimal infra for PR
        run: |
          az deployment group create \
            --name pr-${{ github.run_number }} \
            --resource-group $RG_NAME \
            --template-file infra/bicep/rg.bicep \
            --parameters location=${{ env.LOCATION }} tailscaleAuthKey=${{ secrets.TAILSCALE_AUTH_KEY }} sshPublicKey="${{ secrets.SSH_PUBLIC_KEY }}" vmPriority=Regular vmSize=Standard_B1s
      - name: Smoke test Function App
        run: |
          APP=$(az functionapp list -g $RG_NAME --query "[?contains(name, 'ts-exit')].name | [0]" -o tsv)
          if [ -z "$APP" ]; then
            echo "Function app not found" >&2
            exit 1
          fi
          STATE=$(az functionapp show -n "$APP" -g $RG_NAME --query "state" -o tsv)
          if [ "$STATE" != "Running" ]; then
            echo "Function app state is $STATE" >&2
            exit 1
          fi
      - name: Delete ephemeral RG
        if: ${{ always() }}
        run: az group delete -n $RG_NAME --yes --no-wait
